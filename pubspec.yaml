name: qr_patrol
description: QR Patrol App MVP
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^2.20.0       # latest stable 2.x
  cloud_firestore: ^4.9.0      # aligns with Firestore API
